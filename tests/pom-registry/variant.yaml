# POM Element Registry — Variant Group (SCM Master)
# Sumber: olshoperp-frontend SCM/master/VariantType/Form.vue + DataList.vue
# Route: /supplychain/variant · API: /supplychain/variant

menu: supplychain-variant
menu_name: Variant
route: /supplychain/variant
create_button_mode: link
pom_helper: tests/helpers/variant.ts
company_default: lumicharmsid

elements:
  create_button:
    strategy: role
    role: link
    name: Create

  code:
    strategy: id
    value: code

  name:
    strategy: id
    value: name
    label: Variant Group Name

  option_name:
    strategy: aria-placeholder
    value: Choose Option
    note: "Multiselect tags + createOption; Enter to add"

  description:
    strategy: textarea
    label: Description

  active_switch:
    strategy: label
    value: Active

  show_for_all_company:
    strategy: label
    value: Show for all company

  save_and_next:
    strategy: role
    role: button
    name: Save & Next
    position: last

  save_all:
    strategy: role
    role: button
    name: Save All
    position: last

  edit_button:
    strategy: id
    value: updateButton
