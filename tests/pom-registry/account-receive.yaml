# POM Element Registry — Account Receive (Customer Payment)
# Sumber: olshoperp-frontend Accounting/AccountReceivable/Receive/*

menu: accounting-customer-payment
menu_name: Account Receive
route: /accounting/customer-payment
create_button_mode: auto
pom_helper: tests/helpers/account-receive.ts
company_default: lumicharmsid

elements:
  create_button:
    strategy: auto
    notes: Link/Button Create → fetchDefaultValues auto-POST → edit

  customer:
    strategy: aria-placeholder
    value: Select Customer

  available_si_link:
    strategy: text
    value: Available Sales Invoice

  cash_bank:
    strategy: aria-placeholder
    value: Select Cash/Bank
    scope: '#receiveDestination'

  bulk_approve_button:
    strategy: css
    value: 'button.bulk-approve'

notes:
  - "Description = automation playwright."
  - "Available SI = Dialog + DataTablesV3 checkbox + Use → customer-payment-detail-bulk."
  - "Cash/Bank = modal checkbox + Use → cash-bank-account/bulk-use."
  - "Approve = radio #open → tombol check-double → modal Approve."
  - "Sebelum approve: amount Receiving Destination = paid amount detail SI."
